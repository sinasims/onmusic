{% extends "base.html" %}
{% load static %}

{% block title %}صفحه پیدا نشد (۴۰۴) | نواهای بیکلام{% endblock %}

{% block content %}
<section class="relative min-h-screen flex items-center pt-24 overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-b from-slate-950 via-indigo-950/30 to-slate-950 z-0"></div>
  <div class="absolute top-1/3 left-1/2 -translate-x-1/2 w-[600px] h-[600px] rounded-full blur-[120px] bg-purple-600/10 z-0"></div>
  <div class="relative z-10 max-w-lg mx-auto px-4 w-full text-center">
    <div class="bg-white/5 border border-white/10 rounded-2xl p-8" data-aos="zoom-in">
      <div class="w-24 h-24 mx-auto mb-6 rounded-full bg-amber-500/10 flex items-center justify-center">
        <i data-lucide="search-x" class="w-12 h-12 text-amber-400"></i>
      </div>
      <h1 class="text-6xl font-bold text-purple-400 mb-2">۴۰۴</h1>
      <p class="text-xl font-bold mb-2">صفحه مورد نظر پیدا نشد</p>
      <p class="text-slate-400 mb-8">صفحه‌ای که به دنبال آن هستید وجود ندارد یا حذف شده است.</p>
      <a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold hover:shadow-lg hover:shadow-purple-500/25 transition-all">
        <i data-lucide="home" class="w-5 h-5"></i>بازگشت به صفحه اصلی
      </a>
    </div>
  </div>
</section>
{% endblock %}
