{% for artist in artists %}
<a href="{% url 'artist_detail' artist.slug %}" class="group bg-white/5 border border-white/10 rounded-2xl overflow-hidden hover:-translate-y-1 transition-all duration-300 hover:shadow-2xl hover:shadow-orange-500/10 text-center p-6">
  {% if artist.image %}
  <img src="{{ artist.image }}" alt="{{ artist.name }}" class="w-20 h-20 rounded-full object-cover mx-auto mb-4 group-hover:scale-110 transition-transform duration-300">
  {% else %}
  <div class="w-20 h-20 rounded-full bg-white/5 mx-auto mb-4 flex items-center justify-center"><i data-lucide="mic-vocal" class="w-8 h-8 text-slate-500"></i></div>
  {% endif %}
  <h3 class="font-bold text-lg mb-1">{{ artist.name }}</h3>
  <p class="text-xs text-slate-500">{{ artist.songs.count }} آهنگ</p>
</a>
{% endfor %}
