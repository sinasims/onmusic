{% load music_extras %}
{% for album in albums %}
<a href="{% url 'album_detail' album.slug %}" class="group relative bg-white/5 border border-white/10 rounded-2xl overflow-hidden hover:-translate-y-1 transition-all duration-300 hover:shadow-2xl hover:shadow-indigo-500/10 card-glow">
  <div class="relative aspect-video overflow-hidden">
    <img src="{{ album.cover }}" alt="{{ album.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
      <span class="p-3 rounded-full bg-white/20 backdrop-blur hover:bg-white/30 transition-colors"><i data-lucide="eye" class="w-5 h-5"></i></span>
    </div>
  </div>
  <div class="p-4">
    <h3 class="font-bold text-lg mb-1 truncate">{{ album.title }}</h3>
    <p class="text-xs text-slate-400">{{ album.songs.count }} قطعه</p>
    <p class="text-sm text-purple-300 font-bold mt-2">{{ album.price|price_format }}</p>
  </div>
</a>
{% endfor %}
