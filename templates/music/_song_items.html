{% load music_extras %}
{% for song in songs %}
<div class="group relative bg-white/5 border border-white/10 rounded-2xl overflow-hidden hover:-translate-y-1 transition-all duration-300 hover:shadow-2xl hover:shadow-purple-500/10 card-glow" data-aos="fade-up">
  <div class="relative aspect-video overflow-hidden">
    <img src="{{ song.cover.url }}" alt="{{ song.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
    <button data-preview-url="{% if song.preview_url %}{{ song.preview_url.url }}{% endif %}" onclick="playPreview('{{ song.title|escapejs }}','{{ song.artist.name|escapejs }}','{{ song.cover.url|escapejs }}','{% if song.preview_url %}{{ song.preview_url.url|escapejs }}{% endif %}')" class="play-btn absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer">
      <span class="p-3 rounded-full bg-white/20 backdrop-blur hover:bg-white/30 transition-colors"><i data-lucide="play" class="play-icon w-5 h-5 fill-current"></i></span>
    </button>
  </div>
  <div class="p-4">
    <h3 class="font-bold mb-0.5 truncate">{{ song.title }}</h3>
    <p class="text-xs text-slate-400 mb-2">{{ song.artist.name }}</p>
    <div class="flex items-center gap-3 text-xs text-slate-500 mb-3">
      <span class="flex items-center gap-1"><i data-lucide="eye" class="w-3 h-3"></i>{{ song.views_count }}</span>
      <span class="flex items-center gap-1"><i data-lucide="shopping-cart" class="w-3 h-3"></i>{{ song.purchase_count }}</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-purple-300 font-bold text-xs">{{ song.price|price_format }}</span>
      <div class="flex items-center gap-1.5">
        <button data-song-id="{{ song.id }}" onclick="toggleWishlist({{ song.id }}, this)" class="wishlist-btn p-1.5 rounded-lg text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-all" title="افزودن به علاقه‌مندی‌ها"><i data-lucide="heart" class="w-4 h-4"></i></button>
        <a href="{% url 'song_detail' song.id %}" class="px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-slate-400 text-xs hover:bg-white/10 transition-colors">جزئیات</a>
      </div>
    </div>
  </div>
</div>
{% endfor %}
